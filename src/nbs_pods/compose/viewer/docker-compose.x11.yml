version: '3'
networks:
  bluesky-services_bluesky:
    external: true
services:
  nbs-viewer:
    image: ghcr.io/xraygui/nbs-pods/viewer:latest
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY}
      - QT_QPA_PLATFORM=xcb
      - IPYTHONDIR=/usr/local/share/ipython
      - NBS_SIM_MODE=1
    command: pixi run viewer
    dns:
      - 10.89.0.1
    networks:
      - bluesky-services_bluesky
