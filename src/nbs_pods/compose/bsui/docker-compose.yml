version: '3'

networks:
  bluesky-services_bluesky:
    external: true

services:
  main:
    image: ${NBS_IMAGE_REG:-ghcr.io/xraygui/nbs-pods/}bluesky:latest
    volumes:
      - ${NBS_PODS_DIR}/config/tiled/profiles:/etc/tiled/profiles
      - ${NBS_PODS_DIR}/config/bluesky:/etc/bluesky
    environment:
      - IPYTHONDIR=/usr/local/share/ipython
      - EPICS_CA_AUTO_ADDR_LIST=yes
    command: ipython --profile default
    dns:
      - 10.89.0.1
    networks:
      - bluesky-services_bluesky
